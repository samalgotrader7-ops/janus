name: Build and publish Docker image

# Phase 5.2 — Distribution. Build the multi-arch Janus image on tag
# push and publish to GitHub Container Registry (ghcr.io). Uses the
# default GITHUB_TOKEN — no extra secret setup required.
#
# Image tags published:
#   ghcr.io/samalgotrader7-ops/janus:1.32.1   (full version)
#   ghcr.io/samalgotrader7-ops/janus:1.32     (major.minor)
#   ghcr.io/samalgotrader7-ops/janus:latest   (always points at newest tag)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.title=Janus
            org.opencontainers.image.description=Claude Code's UX, on any model, with plain-text state and a learning loop.
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
